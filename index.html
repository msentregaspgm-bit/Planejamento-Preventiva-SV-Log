<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SV MASTER - Sistema Integrado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --sv-blue: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD;
            --sv-accent: #4CC9F0; --sv-danger: #EF4444; --sv-success: #22C55E;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue); color: var(--sv-text); margin: 0; padding: 0; overflow-x: hidden; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--sv-blue); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        #splash img { width: 180px; }

        #screen-home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; }
        .menu-card { background: var(--sv-blue-mid); border: 2px solid var(--sv-yellow); padding: 25px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .menu-card h2 { margin: 10px 0 0; font-size: 1.1rem; color: var(--sv-yellow); text-transform: uppercase; }

        .screen { display: none; width: 100%; min-height: 100vh; background: var(--sv-blue); z-index: 100; animation: fadeIn 0.4s; }
        .active-screen { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .navbar { background: var(--sv-blue-mid); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--sv-yellow); position: sticky; top: 0; z-index: 999; }
        .navbar img { height: 35px; }
        .btn-voltar { background: var(--sv-yellow); border: none; padding: 10px 18px; border-radius: 8px; font-weight: 800; cursor: pointer; color: var(--sv-blue); font-size: 11px; text-transform: uppercase; }

        /* MANUTENÇÃO */
        .kpi-grid-manut { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; padding: 15px; }
        .kpi-card-manut { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); }
        .kpi-card-manut .value { font-size: 24px; font-weight: 800; }
        .table-card { background: var(--sv-blue-mid); border-radius: 12px; padding: 10px; margin: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--sv-yellow); border-bottom: 2px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* BI KPIs */
        .kpi-grid-bi { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        @media (min-width: 768px) { .kpi-grid-bi { grid-template-columns: repeat(4, 1fr); } }
        .kpi-card-bi { background: var(--sv-blue-mid); padding: 15px; border-radius: 10px; text-align: center; border-left: 4px solid var(--sv-yellow); }
        .kpi-card-bi .value { font-size: 18px; font-weight: 800; color: white; margin-top: 5px; }

        /* BI CHARTS */
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 15px; }
        .chart-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .canvas-wrapper { height: 280px; position: relative; width: 100%; }

        /* CHECKLIST */
        .category-block { background: white; border-radius: 10px; margin: 15px; overflow: hidden; color: #333; }
        .category-title { background: #f1f3f6; font-weight: 800; padding: 12px; color: var(--sv-blue-mid); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        select, input { background: #001d3d; color: white; border: 1.5px solid var(--sv-yellow); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="splash"><img src="Logo.png"></div>

<div id="screen-home">
    <img src="Logo.png" style="width: 200px; margin-bottom: 40px;">
    <div class="menu-grid">
        <div class="menu-card" onclick="showScreen('manutencao')"><h2>⚙️ Manutenção</h2></div>
        <div class="menu-card" onclick="showScreen('bi')"><h2>📊 Gestão BI</h2></div>
        <div class="menu-card" onclick="showScreen('checklist')"><h2>📋 Checklist</h2></div>
    </div>
</div>

<div id="screen-manutencao" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="voltarHome()">INÍCIO</button></div>
    <div class="kpi-grid-manut">
        <div class="kpi-card-manut"><h3>FROTA</h3><div class="value" id="kTotalManut">0</div></div>
        <div class="kpi-card-manut" style="border-left-color: var(--sv-danger)"><h3>VENCIDAS</h3><div class="value" id="kVencidasManut">0</div></div>
        <div class="kpi-card-manut" style="border-left-color: var(--sv-yellow)"><h3>ATENÇÃO</h3><div class="value" id="kAtencaoManut">0</div></div>
        <div class="kpi-card-manut" style="border-left-color: var(--sv-success)"><h3>OK</h3><div class="value" id="kOkManut">0</div></div>
    </div>
    <div class="table-card">
        <table id="tabelaDadosManut">
            <thead><tr><th>Placa</th><th>KM Atual</th><th>Meta</th><th>Status</th><th>Faltam</th><th>Tipo</th><th>Ação</th></tr></thead>
            <tbody id="listaManutencao"></tbody>
        </table>
    </div>
</div>

<div id="screen-bi" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="voltarHome()">INÍCIO</button></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; padding: 15px;">
        <input type="month" id="fDataBI" onchange="updateDashboardBI()">
        <select id="fManutBI" onchange="updateDashboardBI()"><option value="">Manutenções</option><option value="Corretiva">Corretiva</option><option value="Preventiva">Preventiva</option></select>
        <select id="fStatusBI" onchange="updateDashboardBI()"><option value="">Status</option><option value="Finalizada">Finalizada</option><option value="Aberta">Aberta</option></select>
    </div>
    <div class="kpi-grid-bi">
        <div class="kpi-card-bi"><h3>TOTAL OS</h3><div class="value" id="kTotalBI">0</div></div>
        <div class="kpi-card-bi"><h3>ABERTAS</h3><div class="value" id="kAbertasBI">0</div></div>
        <div class="kpi-card-bi"><h3>FECHADAS</h3><div class="value" id="kFechadasBI">0</div></div>
        <div class="kpi-card-bi"><h3>CUSTO PEÇAS</h3><div class="value" id="kCustoBI">R$ 0</div></div>
    </div>
    <div class="charts-container">
        <div class="chart-card"><h4>Volume por Sistema</h4><div class="canvas-wrapper"><canvas id="cParetoBI"></canvas></div></div>
        <div class="chart-card"><h4>Custo por Sistema</h4><div class="canvas-wrapper"><canvas id="cCustoBIChart"></canvas></div></div>
    </div>
</div>

<div id="screen-checklist" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="voltarHome()">INÍCIO</button></div>
    <div style="max-width: 450px; margin: auto; padding: 20px;">
        <label>OPERADOR</label><input type="text" id="operador" style="margin-bottom:10px; width:100%">
        <label>MÁQUINA</label><select id="tipoMaquina" onchange="filtraIDsCheck()" style="width:100%"><option value="">Selecione...</option></select>
        <select id="idMaquina" style="margin: 15px 0; width:100%"><option value="">ID...</option></select>
        <button class="btn-voltar" style="width:100%" onclick="irParaChecklist()">INICIAR</button>
    </div>
</div>

<div id="screen-exec" class="screen">
    <div class="navbar"><img src="Logo.png"> <button class="btn-voltar" onclick="showScreen('checklist')">VOLTAR</button></div>
    <div id="checklistArea"></div>
    <button class="btn-voltar" style="width:100%; padding:20px" onclick="alert('Enviado!')">ENVIAR</button>
</div>

<script>
    const URL_MANUT = "https://script.google.com/macros/s/AKfycbyvcSi6c3rAAnJd7QpfOFWc84eOUrtIurW23giO-tLg34bmycNG_yxms8BWsWZzmQzv/exec";
    const URL_CHECKLIST = "https://script.google.com/macros/s/AKfycbxXLqXBs3Of8h2TE1I2B61NfcJVONzHe45wGpzRaXlHdSAnBsdrZ67aALUjiN3DVj1z/exec";
    const URL_BI = "https://script.google.com/macros/s/AKfycbyScWcG4rDlFV4IabBhxaIQD1FmA0s-iLS9RvZyfVpgi9XrUjWyQxztZrA0RjmOmREmIw/exec";

    let DADOS_BI_RAW = [], D_MAQUINAS = [], D_ITENS = [], charts = {};

    window.onload = () => { setTimeout(() => document.getElementById('splash').style.display = 'none', 1000); };

    function showScreen(id) {
        document.querySelectorAll('.screen, #screen-home').forEach(s => s.classList.remove('active-screen'));
        document.getElementById('screen-' + id).classList.add('active-screen');
        if(id === 'manutencao') carregarManut();
        if(id === 'bi') carregarBI();
        if(id === 'checklist') carregarChecklist();
    }

    function voltarHome() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById('screen-home').classList.add('active-screen');
    }

    // --- LÓGICA BI (CORRIGIDA) ---
    async function carregarBI() {
        if(DADOS_BI_RAW.length === 0) {
            const res = await fetch(URL_BI);
            DADOS_BI_RAW = await res.json();
        }
        updateDashboardBI();
    }

    function updateDashboardBI() {
        const fD = document.getElementById('fDataBI').value;
        const fM = document.getElementById('fManutBI').value;
        const fS = document.getElementById('fStatusBI').value;

        const data = DADOS_BI_RAW.filter(d => 
            (fD ? String(d.data_e_hora_de_inicio).includes(fD) : true) &&
            (fM ? d.manutencao === fM : true) &&
            (fS ? d.status === fS : true)
        );

        document.getElementById('kTotalBI').innerText = data.length;
        document.getElementById('kAbertasBI').innerText = data.filter(x => x.status === 'Aberta').length;
        document.getElementById('kFechadasBI').innerText = data.filter(x => x.status === 'Finalizada').length;
        document.getElementById('kCustoBI').innerText = data.reduce((a,b) => a + (b.produtos || 0), 0).toLocaleString('pt-br', {style:'currency', currency:'BRL'});

        renderChartsBI(data);
    }

    function renderChartsBI(data) {
        // Limpa gráficos anteriores se existirem
        if(charts.pareto) charts.pareto.destroy();
        if(charts.custo) charts.custo.destroy();

        const sistemas = [...new Set(data.map(d => d.sistema || "N/A"))];
        const contagem = sistemas.map(s => data.filter(d => d.sistema === s).length);
        const custos = sistemas.map(s => data.filter(d => d.sistema === s).reduce((a,b) => a + (b.produtos || 0), 0));

        const ctxP = document.getElementById('cParetoBI').getContext('2d');
        charts.pareto = new Chart(ctxP, {
            type: 'bar',
            data: { labels: sistemas, datasets: [{ label: 'Qtd OS', data: contagem, backgroundColor: '#FFD60A' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        const ctxC = document.getElementById('cCustoBIChart').getContext('2d');
        charts.custo = new Chart(ctxC, {
            type: 'bar',
            data: { labels: sistemas, datasets: [{ label: 'Custo R$', data: custos, backgroundColor: '#4CC9F0' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    // --- MANUTENÇÃO ---
    async function carregarManut() {
        const res = await fetch(URL_MANUT);
        const data = await res.json();
        const lista = document.getElementById('listaManutencao');
        lista.innerHTML = data.map(item => `
            <tr>
                <td>${item.prefixo}</td>
                <td>${item.kmAtual}</td>
                <td>${item.proximaKM}</td>
                <td>${item.status}</td>
                <td>${item.faltam}</td>
                <td>${item.tipo}</td>
                <td><button class="btn-done">CONCLUIR</button></td>
            </tr>
        `).join('');
        
        document.getElementById('kTotalManut').innerText = data.length;
        document.getElementById('kVencidasManut').innerText = data.filter(x => x.status === 'vermelho').length;
    }

    // --- CHECKLIST ---
    async function carregarChecklist() {
        if(D_MAQUINAS.length === 0) {
            const res = await fetch(URL_CHECKLIST);
            const data = await res.json();
            D_MAQUINAS = data.maquinas; D_ITENS = data.itens;
            const selT = document.getElementById('tipoMaquina');
            [...new Set(D_MAQUINAS.map(m => m.tipo_maquina))].forEach(t => selT.innerHTML += `<option value="${t}">${t}</option>`);
        }
    }
    function filtraIDsCheck() {
        const t = document.getElementById('tipoMaquina').value;
        const s = document.getElementById('idMaquina');
        s.innerHTML = D_MAQUINAS.filter(m => m.tipo_maquina === t).map(m => `<option value="${m.id_maquina}">${m.id_maquina}</option>`).join('');
    }
    function irParaChecklist() {
        const t = document.getElementById('tipoMaquina').value;
        const itensF = D_ITENS.filter(i => i.tipo_maquina.toString().toLowerCase() === t.toLowerCase());
        const area = document.getElementById('checklistArea');
        area.innerHTML = itensF.map(it => `<div class="category-block"><div class="item-row"><span>${it.item}</span><select style="width:80px"><option>OK</option><option>NOK</option></select></div></div>`).join('');
        showScreen('exec');
    }
</script>
</body>
</html>
