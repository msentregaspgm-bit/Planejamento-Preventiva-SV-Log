<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SV LOG - SISTEMA INTEGRADO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --sv-blue-dark: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --sv-text: #E0E1DD; --verde: #22C55E; --amarelo: #FFD60A; --vermelho: #EF4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue-dark); color: var(--sv-text); margin: 0; padding: 0; overflow-x: hidden; }

        /* HEADER E NAV */
        .navbar { background: var(--sv-blue-mid); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--sv-yellow); position: sticky; top: 0; z-index: 999; }
        .navbar img { height: 35px; }
        .btn-voltar { background: var(--sv-yellow); border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; color: var(--sv-blue-dark); font-size: 11px; text-transform: uppercase; }

        /* HOME MENU */
        #screen-home { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 400px; }
        .menu-card { background: var(--sv-blue-mid); border: 2px solid var(--sv-yellow); padding: 30px; border-radius: 20px; cursor: pointer; text-align: center; }
        .menu-card h2 { margin-top: 10px; font-size: 1.2rem; color: var(--sv-yellow); text-transform: uppercase; }

        /* TELAS (Ocultas por padrão) */
        .screen { display: none; padding: 10px; max-width: 1600px; margin: auto; animation: fadeIn 0.4s; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ESTILOS ESPECÍFICOS MANUTENÇÃO */
        .kpi-grid-manut { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .kpi-card-manut { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); cursor: pointer; }
        .kpi-card-manut .value { font-size: 24px; font-weight: 800; }
        .table-card { background: var(--sv-blue-mid); border-radius: 12px; padding: 10px; overflow-x: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        table.tab-manut { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 13px; }
        .tab-manut th { text-align: left; padding: 12px; color: var(--sv-yellow); border-bottom: 2px solid rgba(255,255,255,0.1); font-size: 11px; text-transform: uppercase; }
        .tab-manut td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .farol { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .btn-done { background: white; color: var(--sv-blue-dark); border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 10px; }

        /* ESTILOS ESPECÍFICOS BI (KPIs COMPACTOS) */
        .kpi-grid-bi { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        @media (min-width: 768px) { .kpi-grid-bi { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); } }
        .kpi-card-bi { background: var(--sv-blue-mid); padding: 12px; border-radius: 10px; text-align: center; border-left: 4px solid var(--sv-yellow); }
        .kpi-card-bi h3 { margin: 0; font-size: 8px; color: var(--sv-yellow); text-transform: uppercase; }
        .kpi-card-bi .value { font-size: 15px; font-weight: 800; margin: 4px 0; color: white; }
        .charts-container { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 992px) { .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } }
        .chart-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 100%; }
        .canvas-wrapper { position: relative; height: 260px; width: 100%; }

        /* CHECKLIST LAYOUT */
        .category-block { background: white; border-radius: 10px; margin: 15px 0; border: 2px solid #e1e5eb; overflow: hidden; color: #333; }
        .category-title { background: #f1f3f6; font-weight: 800; padding: 10px; font-size: 11px; color: var(--sv-blue-mid); }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        input, select { background: #001d3d; color: white; border: 1px solid var(--sv-yellow); padding: 8px; border-radius: 5px; width: 100%; }
    </style>
</head>
<body>

<div id="screen-home" class="active">
    <img src="https://i.imgur.com/G4xK2uE.jpeg" style="width: 180px; margin-bottom: 30px;">
    <div class="menu-grid">
        <div class="menu-card" onclick="showScreen('manutencao')"><h2>⚙️ Manutenção</h2></div>
        <div class="menu-card" onclick="showScreen('bi')"><h2>📊 Gestão BI</h2></div>
        <div class="menu-card" onclick="showScreen('checklist')"><h2>📋 Checklist</h2></div>
    </div>
</div>

<div id="screen-manutencao" class="screen">
    <div class="navbar"><img src="https://i.imgur.com/G4xK2uE.jpeg"> <button class="btn-voltar" onclick="voltarInicio()">INÍCIO</button></div>
    
    <div class="kpi-grid-manut" style="margin-top:20px;">
        <div class="kpi-card-manut" onclick="setFilterManut('todos')"><h3>FROTA ATIVA</h3><div class="value" id="kTotalManut">0</div></div>
        <div class="kpi-card-manut" onclick="setFilterManut('vermelho')" style="border-left-color: var(--vermelho)"><h3>VENCIDAS</h3><div class="value" id="kVencidasManut">0</div></div>
        <div class="kpi-card-manut" onclick="setFilterManut('amarelo')" style="border-left-color: var(--amarelo)"><h3>ATENÇÃO</h3><div class="value" id="kAtencaoManut">0</div></div>
        <div class="kpi-card-manut" onclick="setFilterManut('verde')" style="border-left-color: var(--verde)"><h3>EM DIA</h3><div class="value" id="kOkManut">0</div></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; margin-bottom: 15px;">
        <input type="text" id="searchManut" placeholder="Buscar placa..." onkeyup="filtrarManut()">
        <button class="btn-voltar" style="background:#ff4d4d; color:white" onclick="exportarPDFManut()">📄 PDF</button>
        <button class="btn-voltar" style="background:#22c55e; color:white" onclick="exportarExcelManut()">📊 EXCEL</button>
        <button class="btn-voltar" onclick="carregarDadosManut()">🔄 ATUALIZAR</button>
    </div>

    <div class="table-card">
        <table id="tabelaDadosManut" class="tab-manut">
            <thead>
                <tr><th>Placa / Modelo</th><th>KM Atual</th><th>Meta</th><th>Status</th><th>Faltam</th><th>Tipo</th><th>Itens</th><th>Ação</th></tr>
            </thead>
            <tbody id="listaManutencao"></tbody>
        </table>
    </div>
</div>

<div id="screen-bi" class="screen">
    <div class="navbar"><img src="https://i.imgur.com/G4xK2uE.jpeg"> <button class="btn-voltar" onclick="voltarInicio()">INÍCIO</button></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin: 15px 0;">
        <input type="month" id="fData" onchange="updateDashboardBI()">
        <select id="fManut" onchange="updateDashboardBI()"><option value="">Manutenções</option><option value="Corretiva">Corretiva</option><option value="Preventiva">Preventiva</option></select>
        <select id="fStatus" onchange="updateDashboardBI()"><option value="">Status</option><option value="Finalizada">Finalizada</option><option value="Aberta">Aberta</option></select>
    </div>
    <div class="kpi-grid-bi">
        <div class="kpi-card-bi"><h3>TOTAL OS</h3><div class="value" id="kTotalBI">0</div></div>
        <div class="kpi-card-bi"><h3>ABERTAS</h3><div class="value" id="kAbertasBI" style="color:#ff4d4d">0</div></div>
        <div class="kpi-card-bi"><h3>FECHADAS</h3><div class="value" id="kFechadasBI" style="color:#00ff88">0</div></div>
        <div class="kpi-card-bi"><h3>CUSTO PEÇAS</h3><div class="value" id="kCustoBI">R$ 0</div></div>
    </div>
    <div class="charts-container">
        <div class="chart-card"><div class="canvas-wrapper"><canvas id="cParetoBI"></canvas></div></div>
        <div class="chart-card"><div class="canvas-wrapper"><canvas id="cHHBI"></canvas></div></div>
    </div>
</div>

<div id="screen-checklist" class="screen">
    <div class="navbar"><img src="https://i.imgur.com/G4xK2uE.jpeg"> <button class="btn-voltar" onclick="voltarInicio()">INÍCIO</button></div>
    <div style="max-width: 450px; margin: auto; padding-top: 15px;">
        <label style="color:var(--sv-yellow); font-weight:700; font-size:11px;">OPERADOR</label>
        <input type="text" id="operador" style="margin-bottom:10px;">
        <label style="color:var(--sv-yellow); font-weight:700; font-size:11px;">TIPO MÁQUINA</label>
        <select id="tipoMaquina" onchange="filtraIDsCheck()"><option value="">Selecione...</option></select>
        <label style="color:var(--sv-yellow); font-weight:700; font-size:11px;">ID MÁQUINA</label>
        <select id="idMaquina"><option value="">Aguardando...</option></select>
        <button class="btn-voltar" style="width:100%; padding:15px; margin-top:15px; font-size:13px;" onclick="irParaExecucaoCheck()">INICIAR</button>
    </div>
</div>

<div id="screen-exec" class="screen">
    <div class="navbar"><img src="https://i.imgur.com/G4xK2uE.jpeg"> <button class="btn-voltar" onclick="showScreen('checklist')">VOLTAR</button></div>
    <div id="bannerCheck" style="text-align:center; padding:10px; font-weight:800; color:var(--sv-yellow); background: var(--sv-blue-mid); border-radius: 8px; margin: 10px 0;"></div>
    <div id="checklistArea"></div>
    <button class="btn-voltar" style="width:100%; padding:18px; margin-top:15px;" onclick="alert('Enviado!')">ENVIAR CHECKLIST</button>
</div>

<script>
    // LINKS DOS SCRIPTS
    const URL_MANUT = "https://script.google.com/macros/s/AKfycbyvcSi6c3rAAnJd7QpfOFWc84eOUrtIurW23giO-tLg34bmycNG_yxms8BWsWZzmQzv/exec";
    const URL_CHECKLIST = "https://script.google.com/macros/s/AKfycbxXLqXBs3Of8h2TE1I2B61NfcJVONzHe45wGpzRaXlHdSAnBsdrZ67aALUjiN3DVj1z/exec";
    const URL_BI = "https://script.google.com/macros/s/AKfycbyScWcG4rDlFV4IabBhxaIQD1FmA0s-iLS9RvZyfVpgi9XrUjWyQxztZrA0RjmOmREmIw/exec";

    let DADOS_MANUT = [], DADOS_BI_RAW = [], D_MAQUINAS = [], D_ITENS = [], charts = {}, FILTRO_MANUT = 'todos';

    // NAVEGAÇÃO DE TELAS (Oculta todas e mostra apenas a solicitada)
    function showScreen(id) {
        document.querySelectorAll('.screen, #screen-home').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        window.scrollTo(0,0);
        if(id === 'manutencao') carregarDadosManut();
        if(id === 'bi') carregarDadosBI();
        if(id === 'checklist') carregarBaseChecklist();
    }

    function voltarInicio() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-home').classList.add('active');
    }

    // --- MANUTENÇÃO ---
    async function carregarDadosManut() {
        try {
            const res = await fetch(URL_MANUT);
            DADOS_MANUT = await res.json();
            renderizarManut();
        } catch (e) { console.error("Erro Manut"); }
    }

    function renderizarManut() {
        const lista = document.getElementById('listaManutencao');
        lista.innerHTML = "";
        let kpis = { ok: 0, atencao: 0, vencido: 0 }, baixas = JSON.parse(localStorage.getItem('baixas_sv') || '{}'), processados = [];

        DADOS_MANUT.forEach(v => {
            let p = v.metasToda.find(m => !(baixas[v.prefixo] && baixas[v.prefixo].includes(m.km)) && v.kmAtual <= (m.km + 2000));
            if (p) {
                let faltam = p.km - v.kmAtual, status = "verde", prio = 3;
                if (faltam <= 0) { status = "vermelho"; prio = 1; kpis.vencido++; }
                else if (faltam <= 3000) { status = "amarelo"; prio = 2; kpis.atencao++; }
                else kpis.ok++;
                processados.push({ ...v, proxima: p, faltam, status, prio });
            }
        });

        processados.sort((a,b) => a.prio - b.prio).forEach(item => {
            if (FILTRO_MANUT !== 'todos' && item.status !== FILTRO_MANUT) return;
            const cor = item.status === 'verde' ? 'var(--verde)' : (item.status === 'amarelo' ? 'var(--amarelo)' : 'var(--vermelho)');
            lista.innerHTML += `<tr>
                <td><b>${item.prefixo}</b><br><small>${item.modelo}</small></td>
                <td>${item.kmAtual.toLocaleString()}</td>
                <td>${item.proxima.km.toLocaleString()}</td>
                <td><div class="farol" style="background:${cor}"></div> ${item.status.toUpperCase()}</td>
                <td style="color:${cor}; font-weight:bold">${item.faltam <= 0 ? 'VENCIDA' : item.faltam.toLocaleString()}</td>
                <td>${item.proxima.tipo}</td>
                <td><small>${item.proxima.itens}</small></td>
                <td>${item.status !== 'verde' ? `<button class="btn-done" onclick="concluirMetaManut('${item.prefixo}', ${item.proxima.km})">CONCLUIR</button>` : '---'}</td>
            </tr>`;
        });
        document.getElementById('kTotalManut').innerText = kpis.vencido + kpis.atencao + kpis.ok;
        document.getElementById('kOkManut').innerText = kpis.ok; document.getElementById('kAtencaoManut').innerText = kpis.atencao; document.getElementById('kVencidasManut').innerText = kpis.vencido;
    }

    function concluirMetaManut(placa, km) {
        let b = JSON.parse(localStorage.getItem('baixas_sv') || '{}');
        if (!b[placa]) b[placa] = []; b[placa].push(km);
        localStorage.setItem('baixas_sv', JSON.stringify(b));
        renderizarManut();
    }
    function setFilterManut(s) { FILTRO_MANUT = s; renderizarManut(); }
    function filtrarManut() {
        let v = document.getElementById("searchManut").value.toUpperCase();
        let rows = document.getElementById("listaManutencao").rows;
        for (let r of rows) r.style.display = r.innerText.toUpperCase().includes(v) ? "" : "none";
    }

    // --- BI ---
    async function carregarDadosBI() {
        if(DADOS_BI_RAW.length === 0) { const res = await fetch(URL_BI); DADOS_BI_RAW = await res.json(); }
        updateDashboardBI();
    }
    function updateDashboardBI() {
        const fD = document.getElementById('fData').value, fM = document.getElementById('fManut').value, fS = document.getElementById('fStatus').value;
        const data = DADOS_BI_RAW.filter(d => (fD ? String(d.data_e_hora_de_inicio).includes(fD) : true) && (fM ? d.manutencao === fM : true) && (fS ? d.status === fS : true));
        document.getElementById('kTotalBI').innerText = data.length;
        document.getElementById('kCustoBI').innerText = data.reduce((a,b)=>a+(b.produtos||0),0).toLocaleString('pt-br',{style:'currency',currency:'BRL', maximumFractionDigits:0});
        renderChartsBI(data);
    }
    function renderChartsBI(data) {
        if(charts.cPareto) charts.cPareto.destroy(); if(charts.cHH) charts.cHH.destroy();
        const ctxP = document.getElementById('cParetoBI'), ctxH = document.getElementById('cHHBI');
        const sP = sortData(data, "sistema", "count");
        charts.cPareto = new Chart(ctxP, { type:'bar', data:{ labels:sP.l, datasets:[{label:'Volume OS', data:sP.v, backgroundColor:'#FFD60A'}] }, options:{maintainAspectRatio:false} });
        const sH = sortData(data, "sistema", "sum", "hh");
        charts.cHH = new Chart(ctxH, { type:'bar', data:{ labels:sH.l, datasets:[{label:'Total HH', data:sH.v, backgroundColor:'#00A8E8'}] }, options:{maintainAspectRatio:false} });
    }

    // --- CHECKLIST ---
    async function carregarBaseChecklist() {
        if(D_MAQUINAS.length === 0) {
            const res = await fetch(URL_CHECKLIST); const data = await res.json();
            D_MAQUINAS = data.maquinas; D_ITENS = data.itens;
            const selT = document.getElementById('tipoMaquina');
            [...new Set(D_MAQUINAS.map(m => m.tipo_maquina))].forEach(t => selT.innerHTML += `<option value="${t}">${t}</option>`);
        }
    }
    function filtraIDsCheck() {
        const t = document.getElementById('tipoMaquina').value, s = document.getElementById('idMaquina'); s.innerHTML = '';
        D_MAQUINAS.filter(m => m.tipo_maquina === t).forEach(m => s.innerHTML += `<option value="${m.id_maquina}">${m.id_maquina}</option>`);
    }
    function irParaExecucaoCheck() {
        const id = document.getElementById('idMaquina').value, t = document.getElementById('tipoMaquina').value;
        if(!id) return alert("Selecione!");
        const itensF = D_ITENS.filter(i => i.tipo_maquina.toString().toLowerCase() === t.toLowerCase());
        document.getElementById('bannerCheck').innerText = `ID: ${id}`;
        const area = document.getElementById('checklistArea'); area.innerHTML = "";
        [...new Set(itensF.map(i => i.categoria))].forEach(c => {
            let h = `<div class="category-block"><div class="category-title">${c}</div>`;
            itensF.filter(i => i.categoria === c).forEach(it => { h += `<div class="item-row"><span>${it.item}</span><select style="width:80px"><option>OK</option><option>NOK</option></select></div>`; });
            area.innerHTML += h + `</div>`;
        });
        showScreen('exec');
    }

    function sortData(arr, k, type, sK) {
        const m = arr.reduce((acc, d) => { const x = d[k] || "N/A"; acc[x] = (acc[x] || 0) + (type==="sum" ? (d[sK]||0) : 1); return acc; }, {});
        const sorted = Object.entries(m).sort((a,b) => b[1] - a[1]).slice(0, 10);
        return { l: sorted.map(x=>x[0]), v: sorted.map(x=>x[1]) };
    }
</script>
</body>
</html>
