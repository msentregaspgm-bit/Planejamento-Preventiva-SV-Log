<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Manutenção - SV LOG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --sv-blue: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --verde: #22C55E; --amarelo: #FFD60A; --vermelho: #EF4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue); color: white; margin: 0; padding: 15px; }
        .header { background: var(--sv-blue-mid); padding: 10px 20px; border-bottom: 3px solid var(--sv-yellow); border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header img { height: 50px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); cursor: pointer; }
        .kpi-card .value { font-size: 24px; font-weight: 800; }
        .controls { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; margin-bottom: 20px; }
        input#search { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,214,10,0.3); background: var(--sv-blue-mid); color: white; outline: none; }
        .btn-action { padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; height: 45px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .btn-pdf { background: #ff4d4d; color: white; }
        .btn-excel { background: #22c55e; color: white; }
        .btn-refresh { background: var(--sv-yellow); color: var(--sv-blue); }
        .table-card { background: var(--sv-blue-mid); border-radius: 12px; padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 12px; color: var(--sv-yellow); border-bottom: 2px solid rgba(255,255,255,0.1); font-size: 11px; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .btn-done { background: white; color: var(--sv-blue); border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 10px; }
        .farol { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="Logo.png" alt="Logo.png">
            <span style="font-weight: 800; font-size: 18px;">MANUTENÇÃO PREVENTIVA SV LOG</span>
        </div>
        <div id="relogio" style="font-size: 11px; opacity: 0.7;"></div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card" onclick="setFilter('todos')"><h3>FROTA ATIVA</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card" onclick="setFilter('vermelho')" style="border-left-color: var(--vermelho)"><h3>VENCIDAS</h3><div class="value" id="kVencidas">0</div></div>
        <div class="kpi-card" onclick="setFilter('amarelo')" style="border-left-color: var(--amarelo)"><h3>ATENÇÃO</h3><div class="value" id="kAtencao">0</div></div>
        <div class="kpi-card" onclick="setFilter('verde')" style="border-left-color: var(--verde)"><h3>EM DIA</h3><div class="value" id="kOk">0</div></div>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="Buscar placa..." onkeyup="filtrar()">
        <button class="btn-action btn-pdf" onclick="exportarPDF()">📄 PDF CHECKLIST</button>
        <button class="btn-action btn-excel" onclick="exportarExcel()">📊 EXCEL</button>
        <button class="btn-action btn-refresh" onclick="carregarDados()">🔄 ATUALIZAR</button>
    </div>

    <div id="loader" style="text-align:center; padding: 20px;">Sincronizando...</div>
    <div class="table-card" id="tableBox" style="display:none">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Placa / Modelo</th>
                    <th>KM Atual</th>
                    <th>Meta</th>
                    <th>Status</th>
                    <th>Faltam</th>
                    <th>Tipo</th>
                    <th>Itens</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaManutencao"></tbody>
        </table>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyvcSi6c3rAAnJd7QpfOFWc84eOUrtIurW23giO-tLg34bmycNG_yxms8BWsWZzmQzv/exec";
        let DADOS_LOCAIS = [];
        let FILTRO_STATUS = 'todos';

        async function carregarDados() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('tableBox').style.display = 'none';
            try {
                const res = await fetch(URL_SCRIPT);
                DADOS_LOCAIS = await res.json();
                renderizar();
            } catch (e) { document.getElementById('loader').innerText = "Erro ao carregar dados."; }
        }

        function concluirMeta(placa, km) {
            let baixas = JSON.parse(localStorage.getItem('baixas_sv') || '{}');
            if (!baixas[placa]) baixas[placa] = [];
            baixas[placa].push(km);
            localStorage.setItem('baixas_sv', JSON.stringify(baixas));
            renderizar();
        }

        function renderizar() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('tableBox').style.display = 'block';
            const lista = document.getElementById('listaManutencao');
            lista.innerHTML = "";
            let kpis = { ok: 0, atencao: 0, vencido: 0 };
            let baixas = JSON.parse(localStorage.getItem('baixas_sv') || '{}');

            let processados = [];

            DADOS_LOCAIS.forEach(veiculo => {
                let proxima = veiculo.metasToda.find(m => {
                    let jaBaixou = baixas[veiculo.prefixo] && baixas[veiculo.prefixo].includes(m.km);
                    return !jaBaixou && veiculo.kmAtual <= (m.km + 2000);
                });

                if (proxima) {
                    let faltam = proxima.km - veiculo.kmAtual;
                    let status = "verde";
                    let prioridade = 3;

                    if (faltam <= 0) { status = "vermelho"; prioridade = 1; kpis.vencido++; }
                    else if (faltam <= 3000) { status = "amarelo"; prioridade = 2; kpis.atencao++; }
                    else { kpis.ok++; }

                    processados.push({ ...veiculo, proxima, faltam, status, prioridade });
                }
            });

            // Ordenação: Vermelho (1), Amarelo (2), Verde (3)
            processados.sort((a, b) => a.prioridade - b.prioridade);

            processados.forEach(item => {
                if (FILTRO_STATUS !== 'todos' && item.status !== FILTRO_STATUS) return;
                const cor = item.status === 'verde' ? 'var(--verde)' : (item.status === 'amarelo' ? 'var(--amarelo)' : 'var(--vermelho)');
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${item.prefixo}</b><br><small>${item.modelo}</small></td>
                    <td>${item.kmAtual.toLocaleString()}</td>
                    <td>${item.proxima.km.toLocaleString()}</td>
                    <td><div class="farol" style="background:${cor}"></div> ${item.status.toUpperCase()}</td>
                    <td style="color:${cor}; font-weight:bold">${item.faltam <= 0 ? 'VENCIDA' : item.faltam.toLocaleString()}</td>
                    <td>${item.proxima.tipo}</td>
                    <td><small>${item.proxima.itens}</small></td>
                    <td>${item.status !== 'verde' ? `<button class="btn-done" onclick="concluirMeta('${item.prefixo}', ${item.proxima.km})">CONCLUIR</button>` : '---'}</td>
                `;
                lista.appendChild(tr);
            });

            document.getElementById('kTotal').innerText = kpis.vencido + kpis.atencao + kpis.ok;
            document.getElementById('kOk').innerText = kpis.ok;
            document.getElementById('kAtencao').innerText = kpis.atencao;
            document.getElementById('kVencidas').innerText = kpis.vencido;
        }

        function exportarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'pt', 'a4');
            const criticos = DADOS_LOCAIS.map(v => {
                let baixas = JSON.parse(localStorage.getItem('baixas_sv') || '{}');
                let p = v.metasToda.find(m => !(baixas[v.prefixo] && baixas[v.prefixo].includes(m.km)) && v.kmAtual <= (m.km + 2000));
                return p && (p.km - v.kmAtual <= 3000) ? { ...v, p } : null;
            }).filter(x => x !== null);

            doc.setFontSize(14);
            doc.text("SV LOG - CHECKLIST DE MANUTENÇÃO (VENCIDAS E ATENÇÃO)", 40, 40);
            
            doc.autoTable({
                head: [['Placa', 'Modelo', 'KM Atual', 'Meta', 'Tipo', 'Itens de Manutenção']],
                body: criticos.map(d => [d.prefixo, d.modelo, d.kmAtual.toLocaleString(), d.p.km.toLocaleString(), d.p.tipo, d.p.itens]),
                startY: 60,
                styles: { fontSize: 8 },
                columnStyles: { 5: { cellWidth: 250 } }
            });
            doc.save("Checklist_SVLOG.pdf");
        }

        function exportarExcel() {
            const wb = XLSX.utils.table_to_book(document.getElementById('tabelaDados'));
            XLSX.writeFile(wb, "Manutencao_SVLOG.xlsx");
        }

        function setFilter(s) { FILTRO_STATUS = s; renderizar(); }
        function filtrar() {
            let val = document.getElementById("search").value.toUpperCase();
            let rows = document.getElementById("listaManutencao").rows;
            for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none"; }
        }

        carregarDados();
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
