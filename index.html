<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção Preventiva - SV LOG</title>
    <style>
        :root { 
            --sv-blue: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; 
            --verde: #22C55E; --amarelo: #FFD60A; --vermelho: #EF4444; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue); color: white; margin: 0; padding: 15px; }
        
        /* Layout Achatado */
        .header { background: var(--sv-blue-mid); padding: 15px; border-bottom: 3px solid var(--sv-yellow); border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); }
        .kpi-card h3 { margin: 0; font-size: 10px; color: var(--sv-yellow); text-transform: uppercase; }
        .kpi-card .value { font-size: 18px; font-weight: 800; margin-top: 5px; }

        .table-card { background: var(--sv-blue-mid); border-radius: 12px; padding: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--sv-yellow); border-bottom: 2px solid rgba(255,255,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .farol { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .bg-verde { background: var(--verde); box-shadow: 0 0 8px var(--verde); }
        .bg-amarelo { background: var(--amarelo); box-shadow: 0 0 8px var(--amarelo); color: black; }
        .bg-vermelho { background: var(--vermelho); box-shadow: 0 0 8px var(--vermelho); }

        .badge-tipo { background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 4px; font-weight: bold; border: 1px solid var(--sv-yellow); }
        #loader { text-align: center; padding: 50px; font-weight: bold; color: var(--sv-yellow); }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-weight: 800; letter-spacing: 1px;">PREVENTIVAS SV LOG</span>
        <button onclick="location.reload()" style="background:var(--sv-yellow); border:none; padding:5px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">ATUALIZAR</button>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card"><h3>TOTAL FROTA</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card" style="border-left-color: var(--verde)"><h3>EM DIA</h3><div class="value" id="kOk">0</div></div>
        <div class="kpi-card" style="border-left-color: var(--amarelo)"><h3>ATENÇÃO</h3><div class="value" id="kAtencao">0</div></div>
        <div class="kpi-card" style="border-left-color: var(--vermelho)"><h3>VENCIDAS</h3><div class="value" id="kVencidas">0</div></div>
    </div>

    <div id="loader">Buscando dados da telemetria...</div>

    <div class="table-card" id="tableBox" style="display:none">
        <table>
            <thead>
                <tr>
                    <th>PREFIXO</th>
                    <th>MODELO</th>
                    <th>KM ATUAL</th>
                    <th>PRÓXIMA META</th>
                    <th>FALTAM</th>
                    <th>TIPO</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="listaManutencao"></tbody>
        </table>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbw3llBGEyKxvpRnu0PIctIt_aJi5F6yjDC4Qhauw4lfMb_CAD-Kj6pVesZ64-h8Oho/exec";

        async function carregarDados() {
            try {
                const res = await fetch(URL_SCRIPT);
                const dados = await res.json();
                renderizar(dados);
            } catch (e) {
                document.getElementById('loader').innerText = "Erro ao carregar dados.";
            }
        }

        function renderizar(dados) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('tableBox').style.display = 'block';
            
            const lista = document.getElementById('listaManutencao');
            let kpis = { total: dados.length, ok: 0, atencao: 0, vencido: 0 };

            dados.forEach(item => {
                if(item.status === 'verde') kpis.ok++;
                if(item.status === 'amarelo') kpis.atencao++;
                if(item.status === 'vermelho') kpis.vencido++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${item.prefixo}</b></td>
                    <td>${item.modelo}</td>
                    <td>${item.kmAtual.toLocaleString()}</td>
                    <td>${item.proximaKM.toLocaleString()}</td>
                    <td style="font-weight:bold">${item.faltam.toLocaleString()} KM</td>
                    <td><span class="badge-tipo">${item.tipo}</span></td>
                    <td><div class="farol bg-${item.status}"></div> ${item.status.toUpperCase()}</td>
                `;
                lista.appendChild(tr);
            });

            document.getElementById('kTotal').innerText = kpis.total;
            document.getElementById('kOk').innerText = kpis.ok;
            document.getElementById('kAtencao').innerText = kpis.atencao;
            document.getElementById('kVencidas').innerText = kpis.vencido;
        }

        carregarDados();
    </script>
</body>
</html>
