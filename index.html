<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Manutenção - SV LOG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --sv-blue: #001D3D; --sv-blue-mid: #003566; --sv-yellow: #FFD60A; --verde: #22C55E; --amarelo: #FFD60A; --vermelho: #EF4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--sv-blue); color: white; margin: 0; padding: 15px; }
        .header { background: var(--sv-blue-mid); padding: 10px 20px; border-bottom: 3px solid var(--sv-yellow); border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header img { height: 55px; border-radius: 4px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: var(--sv-blue-mid); padding: 15px; border-radius: 12px; text-align: center; border-left: 4px solid var(--sv-yellow); cursor: pointer; transition: 0.3s; }
        .kpi-card:hover { transform: translateY(-5px); background: #004080; }
        .kpi-card .value { font-size: 24px; font-weight: 800; margin-top: 5px; }
        .controls { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; margin-bottom: 20px; }
        input#search { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,214,10,0.3); background: var(--sv-blue-mid); color: white; outline: none; }
        .btn-action { padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; height: 45px; display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .btn-pdf { background: #ff4d4d; color: white; }
        .btn-excel { background: #22c55e; color: white; }
        .btn-refresh { background: var(--sv-yellow); color: var(--sv-blue); }
        .table-card { background: var(--sv-blue-mid); border-radius: 12px; padding: 10px; overflow-x: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 12px; color: var(--sv-yellow); border-bottom: 2px solid rgba(255,255,255,0.1); font-size: 11px; text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .progress-bg { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 1s ease-in-out; }
        .farol { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .btn-done { background: white; color: var(--sv-blue); border: none; padding: 6px 12px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 10px; margin-left: 10px; }
        #loader { text-align: center; padding: 50px; font-weight: bold; color: var(--sv-yellow); }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://i.imgur.com/G4xK2uE.jpeg" alt="Logo SV">
            <span style="font-weight: 800; font-size: 18px;">MANUTENÇÃO PREVENTIVA SV LOG</span>
        </div>
        <div id="relogio" style="font-size: 11px; opacity: 0.7;"></div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card" onclick="setFilter('todos')"><h3>FROTA</h3><div class="value" id="kTotal">0</div></div>
        <div class="kpi-card" onclick="setFilter('vermelho')" style="border-left-color: var(--vermelho)"><h3>VENCIDAS</h3><div class="value" id="kVencidas">0</div></div>
        <div class="kpi-card" onclick="setFilter('amarelo')" style="border-left-color: var(--amarelo)"><h3>ATENÇÃO</h3><div class="value" id="kAtencao">0</div></div>
        <div class="kpi-card" onclick="setFilter('verde')" style="border-left-color: var(--verde)"><h3>EM DIA</h3><div class="value" id="kOk">0</div></div>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="Buscar placa..." onkeyup="filtrar()">
        <button class="btn-action btn-pdf" onclick="exportarPDF()">📄 PDF</button>
        <button class="btn-action btn-excel" onclick="exportarExcel()">📊 EXCEL</button>
        <button class="btn-action btn-refresh" onclick="carregarDados()">🔄 ATUALIZAR</button>
    </div>

    <div id="loader">SINCRONIZANDO...</div>
    <div class="table-card" id="tableBox" style="display:none">
        <table>
            <thead>
                <tr>
                    <th>Placa / Modelo</th>
                    <th>KM Atual</th>
                    <th>Próxima Meta</th>
                    <th>Faltam</th>
                    <th>Tipo</th>
                    <th>Status / Ação</th>
                </tr>
            </thead>
            <tbody id="listaManutencao"></tbody>
        </table>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxtZufPgEXK1_umSVuyUsYuLQUrlRs4soL7LwnewxaUXsnUmqq5Qd5OD1k9aFMdCRDD/exec";
        let DADOS_LOCAIS = [];
        let FILTRO_STATUS = 'todos';

        async function carregarDados() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('tableBox').style.display = 'none';
            try {
                const res = await fetch(URL_SCRIPT);
                DADOS_LOCAIS = await res.json();
                DADOS_LOCAIS.sort((a, b) => a.faltam - b.faltam);
                renderizar();
            } catch (e) { document.getElementById('loader').innerText = "Erro ao carregar."; }
        }

        function renderizar() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('tableBox').style.display = 'block';
            const lista = document.getElementById('listaManutencao');
            lista.innerHTML = "";
            let kpis = { total: DADOS_LOCAIS.length, ok: 0, atencao: 0, vencido: 0 };

            DADOS_LOCAIS.forEach(item => {
                if(item.status === 'verde') kpis.ok++;
                if(item.status === 'amarelo') kpis.atencao++;
                if(item.status === 'vermelho') kpis.vencido++;
                if (FILTRO_STATUS !== 'todos' && item.status !== FILTRO_STATUS) return;

                const corBarra = item.status === 'verde' ? 'var(--verde)' : (item.status === 'amarelo' ? 'var(--amarelo)' : 'var(--vermelho)');
                const metaAnterior = item.proximaKM - 40000;
                let pct = Math.min(Math.max(((item.kmAtual - metaAnterior) / 40000) * 100, 0), 100);

                const tr = document.createElement('tr');
                tr.onclick = () => alert(`ITENS:\n${item.itens}`);
                tr.innerHTML = `
                    <td><b>${item.prefixo}</b><br><small>${item.modelo}</small></td>
                    <td>${item.kmAtual.toLocaleString()}</td>
                    <td>
                        <div style="font-size:10px">${item.proximaKM.toLocaleString()} KM</div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${corBarra}"></div></div>
                    </td>
                    <td style="color:${corBarra}; font-weight:bold">${item.faltam <= 0 ? 'VENCIDA' : item.faltam.toLocaleString() + ' KM'}</td>
                    <td>${item.tipo}</td>
                    <td>
                        <div class="farol bg-${item.status} ${item.status === 'vermelho' ? 'pulse' : ''}"></div>
                        ${item.status.toUpperCase()}
                        ${item.status !== 'verde' ? `<button class="btn-done" onclick="event.stopPropagation(); baixarManutencao('${item.prefixo}','${item.modelo}',${item.proximaKM},'${item.tipo}')">✓ CONCLUIR</button>` : ''}
                    </td>
                `;
                lista.appendChild(tr);
            });
            document.getElementById('kTotal').innerText = kpis.total;
            document.getElementById('kOk').innerText = kpis.ok;
            document.getElementById('kAtencao').innerText = kpis.atencao;
            document.getElementById('kVencidas').innerText = kpis.vencido;
        }

        async function baixarManutencao(placa, modelo, km, tipo) {
            if(!confirm(`Concluir revisão ${tipo} de ${km} KM?`)) return;
            const btn = event.target;
            btn.innerText = "⏳..."; btn.disabled = true;
            const url = `${URL_SCRIPT}?placa=${encodeURIComponent(placa)}&modelo=${encodeURIComponent(modelo)}&km=${km}&tipo=${encodeURIComponent(tipo)}&acao=baixar`;
            try {
                await fetch(url, { mode: 'no-cors' });
                alert("Baixa realizada! Atualizando...");
                setTimeout(carregarDados, 3000);
            } catch (e) { alert("Erro."); btn.innerText = "✓ CONCLUIR"; btn.disabled = false; }
        }

        function setFilter(s) { FILTRO_STATUS = s; renderizar(); }
        function filtrar() {
            let val = document.getElementById("search").value.toUpperCase();
            let rows = document.getElementById("listaManutencao").rows;
            for (let r of rows) { r.style.display = r.innerText.toUpperCase().includes(val) ? "" : "none"; }
        }
        function exportarPDF() { /* lógica pdf */ }
        function exportarExcel() { /* lógica excel */ }

        carregarDados();
        setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
